<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Help Services Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e40af);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.register-box{
background:#fff;
width:100%;
max-width:450px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.top{
background:linear-gradient(90deg,#0ea5e9,#1d4ed8);
padding:30px 20px;
text-align:center;
color:white;
}

.top h1{
font-size:30px;
margin-bottom:10px;
}

.content{
padding:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

.register-btn{
width:100%;
background:#1d4ed8;
color:white;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.register-btn:hover{
background:#1e3a8a;
}

.login-link{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
font-weight:bold;
color:#1d4ed8;
}

.support{
text-align:center;
margin-top:20px;
font-size:14px;
}

.support a{
color:#1d4ed8;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="register-box">

<div class="top">
<h1>Create Account</h1>
<p>Student Help Services</p>
</div>

<div class="content">

<label>First Name</label>
<input type="text" placeholder="Enter First Name">

<label>Last Name</label>
<input type="text" placeholder="Enter Last Name">

<label>Mobile Number</label>
<input type="tel" placeholder="Enter Mobile Number">

<label>Email ID</label>
<input type="email" placeholder="Enter Email ID">

<label>Password</label>
<input type="password" placeholder="Create Password">

<label>Confirm Password</label>
<input type="password" placeholder="Confirm Password">

<button class="register-btn">
📝 Create Account
</button>

<a href="login.html" class="login-link">
🔐 Already Have An Account? Login
</a>

<div class="support">
Need Help?<br><br>
<a href="https://t.me/Student_help_service_00">
📩 Contact Support
</a>
</div>

</div>

</div>

</body>
</html>
