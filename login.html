<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Help Services Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e40af);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
background:#fff;
width:100%;
max-width:420px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.top{
background:linear-gradient(90deg,#0ea5e9,#1d4ed8);
padding:35px 20px;
text-align:center;
color:white;
}

.top h1{
font-size:34px;
margin-bottom:10px;
}

.top p{
opacity:.9;
}

.content{
padding:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:18px;
font-size:16px;
}

.login-btn{
width:100%;
background:#1d4ed8;
color:white;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
background:#1e3a8a;
}

.create-btn{
display:block;
text-align:center;
margin-top:15px;
padding:14px;
border:2px solid #1d4ed8;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:#1d4ed8;
}

.support{
text-align:center;
margin-top:20px;
font-size:14px;
}

.support a{
color:#1d4ed8;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="login-box">

<div class="top">
<h1>Welcome Back</h1>
<p>Student Help Services</p>
</div>

<div class="content">

<label>Mobile Number / Email</label>
<input type="text" placeholder="Enter Mobile Number or Email">

<label>Password</label>
<input type="password" placeholder="Enter Password">

<button class="login-btn">
🔐 Login
</button>

<a href="register.html" class="create-btn">
📝 Create New Account
</a>

<div class="support">
Need Help?<br><br>
<a href="https://t.me/Student_help_service_00">
📩 Contact Support
</a>
</div>

</div>

</div>

</body>
</html>
